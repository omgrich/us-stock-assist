          {{"fund": "", "ticker": "", "sector": "", "thesis_guess": ""}}
        ],
        "full_exits": [
          {{"fund": "", "ticker": "", "possible_reason": ""}}
        ],
        "hot_sectors": [""],
        "cold_sectors": [""],
        "sources": ["", ""]
      }}

  # ────────────────────────────────────────────
  # 9. 投资组合对冲策略（按需执行）
  # ────────────────────────────────────────────
  portfolio_hedge:
    name: "投资组合对冲策略"
    schedule: "on_demand"
    template: |
      今天是{DATE}。你是一位期权策略和风险管理专家。

      ## 当前组合暴露
      {PORTFOLIO_EXPOSURE}

      ## 你有以下工具可以使用
      - get_market_data：获取 VIX 和反向ETF数据
      - get_macro_data：获取 VIXCLS 恐慌指数历史数据
      - web_search：搜索当前期权隐含波动率和对冲成本数据

      ## 任务步骤
      1. 用 get_macro_data(series_id="VIXCLS") 获取VIX历史数据
      2. 用 get_market_data(ticker="^VIX", data_type="price_history") 获取当前VIX
      3. 用 get_market_data 获取对冲工具数据：
         - SQQQ（3倍做空纳斯达克）
         - SPXU（3倍做空标普）
         - GLD（黄金对冲）
         - TLT（国债对冲）
      4. 用 web_search 搜索：
         - "SPY put options cost hedge portfolio {DATE}"
         - "current implied volatility hedge cost"
      5. 根据当前VIX水平和组合暴露，设计2-3个对冲方案并比较成本效益

      ## 输出要求
      严格输出以下JSON：
      {{
        "analysis_date": "{DATE}",
        "portfolio_exposure": "{PORTFOLIO_EXPOSURE}",
        "current_vix": 0,
        "vix_percentile": "",
        "hedge_strategies": [
          {{
            "strategy_name": "",
            "instruments": [""],
            "hedge_ratio_pct": 0,
            "annualized_cost_pct": 0,
            "max_drawdown_protection_pct": 0,
            "activation_scenario": "",
            "implementation_steps": [""]
          }}
        ],
        "recommended_strategy": "",
        "recommendation_reason": ""
      }}

  # ────────────────────────────────────────────
  # 10. 每日多空精选（每个交易日执行）
  # ────────────────────────────────────────────
  daily_trade_ideas:
    name: "每日多空精选"
    schedule: "daily_09:00"
    template: |
      今天是{DATE}。你是一位擅长短线交易的量化基金经理。

      ## 你有以下工具可以使用
      - web_search：搜索今日市场热点、涨跌异动、催化剂新闻、情绪指标
      - get_market_data：获取候选标的的技术指标和价格数据
      - get_macro_data：获取 VIX 恐慌指数历史数据

      ## 分析框架
      标的选择以 **基本面催化剂 + 技术形态** 为主要驱动，
      情绪指标（VIX/Fear&Greed/P-C Ratio）仅作辅助校准，用于调整盈亏比要求和过滤极端环境下的高风险方向。

      ---

      ## 任务步骤

      ### Step 1：做多候选扫描（主要分析）

      #### 1A. 催化剂驱动扫描
      用 web_search 搜索以下类型的潜在利好：
      - "earnings beat analyst upgrade {DATE} stock surge"
      - "FDA approval contract win product launch stocks {DATE}"
      - "analyst upgrade price target raise {DATE} stocks"
      - "sector rotation into {DATE} strong inflow ETF"
      从中找出 3-5 个有明确正面催化剂的候选

      #### 1B. 技术突破形态扫描
      用 web_search 搜索准备向上突破的技术形态：
      - "stocks breaking out above resistance today {DATE} high volume"
      - "bullish technical setup cup handle flag breakout {DATE}"
      从中再补充 2-3 个纯技术突破候选（可与1A重叠）

      #### 1C. 技术面验证（对1A+1B所有候选执行）
      对每个候选：
      - 用 get_market_data(ticker=候选股, data_type="technical_indicators") 确认：
        * RSI 在 40-65 之间（健康上升区间，非追高）
        * 价格站上 20 日均线
        * 成交量相对均量放大（突破时必须有量）
      - 用 get_market_data(ticker=候选股, data_type="price_history", period="1mo") 确认近期趋势方向
      - 打分（每项1分，满分3分）：催化剂明确 / 技术条件满足 / 趋势向上
      - 选出综合得分最高的1个

      ---

      ### Step 2：做空候选扫描（主要分析）

      #### 2A. 催化剂驱动扫描
      用 web_search 搜索以下类型的潜在利空：
      - "earnings miss guidance cut stocks {DATE} downgrade"
      - "analyst downgrade price target cut {DATE}"
      - "FDA rejection product recall lawsuit negative news {DATE}"
      - "sector rotation out of {DATE} fund outflow"
      从中找出 3-5 个有明确负面催化剂的候选

      #### 2B. 技术破位形态扫描
      用 web_search 搜索准备向下破位的技术形态：
      - "stocks breaking down below support today {DATE} volume"
      - "bearish technical breakdown head shoulders double top {DATE}"
      从中再补充 2-3 个纯技术破位候选（可与2A重叠）

      #### 2C. 技术面验证（对2A+2B所有候选执行）
      对每个候选：
      - 用 get_market_data(ticker=候选股, data_type="technical_indicators") 确认：
        * RSI > 65 （超买区间）或价格跌破关键支撑位
        * 价格低于 20 日均线（趋势转弱）
        * 成交量配合（量能支持下跌）
      - 用 get_market_data(ticker=候选股, data_type="price_history", period="1mo") 确认近期趋势方向
      - 打分（每项1分，满分3分）：催化剂明确 / 技术条件满足 / 趋势向下
      - 选出综合得分最高的1个

      ---

      ### Step 3：情绪辅助校准（在Step1/2选出候选后执行）

      #### 3A. 获取情绪数据
      1. 用 get_macro_data(series_id="VIXCLS") 获取 VIX 历史数据，计算当前值在近1年中的分位
      2. 用 web_search 搜索：
         - "CNN fear and greed index today {DATE}"
         - "CBOE put call ratio today {DATE}"

      #### 3B. 情绪校准规则（基于以上数据对Step1/2的结论进行调整）
      - VIX < 12 或 Fear&Greed > 75（极度贪婪）：多单盈亏比要求提高至 2.5；若做多候选仅靠动量无催化剂则放弃
      - VIX > 30 或 Fear&Greed < 25（极度恐慌）：空单盈亏比要求提高至 2.5；若做空候选已大幅下跌则放弃追空
      - VIX 12-30（正常区间）：保持 Step1/2 原始判断，盈亏比要求 >= 2.0
      - P-C Ratio > 1.2（极度恐慌信号）：对多单适当放宽 RSI 要求至 35（超跌反弹逻辑）
      - P-C Ratio < 0.7（过度乐观信号）：对空单优先级提升

      不满足调整后盈亏比要求的候选直接放弃，重新从备选中选取次优的。

      ---

