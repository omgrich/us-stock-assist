# 私人对冲基金 - 提示词配置（Bedrock Tool Use 版）
# 核心变化：从"让LLM自己搜索"改为"LLM通过Tools获取数据后分析"
# 每个提示词都明确告知 LLM 应该调用哪类工具、获取什么数据

prompts:

  # ────────────────────────────────────────────
  # 1. 宏观面自上而下分析
  # ────────────────────────────────────────────
  macro_analysis:
    name: "宏观面自上而下分析"
    schedule: "weekly_monday_08:00"
    template: |
      今天是{DATE}。你是一位顶级宏观对冲基金分析师。

      ## 你有以下工具可以使用
      - get_macro_data：获取 FRED 宏观经济指标（CPI/利率/GDP/就业/收益率曲线）
      - web_search：搜索最新美联储声明、欧央行政策、宏观新闻

      ## 任务步骤
      1. 用 get_macro_data 依次获取以下数据（series_id 如下）：
         - CPIAUCSL（CPI通胀）
         - CPILFESL（核心CPI）
         - FEDFUNDS（联邦基金利率）
         - GDP（美国GDP）
         - UNRATE（失业率）
         - PAYEMS（非农就业）
         - T10Y2Y（收益率曲线：10年-2年利差）
         - DGS10（10年期美债收益率）
      2. 用 web_search 搜索：
         - "Fed latest statement {DATE}"
         - "ECB rate decision {DATE}"
         - "current macro environment sectors outperform"
      3. 综合以上数据，找出3个与当前宏观环境最相似的历史时期

      ## 输出要求
      完成数据收集后，严格输出以下JSON，不得添加任何前缀或说明：
      {{
        "analysis_date": "{DATE}",
        "macro_snapshot": {{
          "inflation": {{"cpi_latest": "", "core_cpi": "", "trend": "上升/下降/稳定"}},
          "interest_rate": {{"fed_rate": "", "ecb_rate": "", "next_move_expectation": ""}},
          "gdp_growth": {{"latest_pct": "", "trend": ""}},
          "employment": {{"nfp_latest": "", "unemployment_rate": ""}}
        }},
        "yield_curve": {{"spread_10y2y": 0, "status": "正常/倒挂/平坦", "interpretation": ""}},
        "favored_sectors": ["", "", ""],
        "avoid_sectors": ["", ""],
        "historical_analogs": [
          {{"period": "", "similarity": "", "outperformers": "", "duration": ""}},
          {{"period": "", "similarity": "", "outperformers": "", "duration": ""}},
          {{"period": "", "similarity": "", "outperformers": "", "duration": ""}}
        ],
        "macro_outlook_3m": "",
        "key_risk": "",
        "sources": ["", "", ""]
      }}

  # ────────────────────────────────────────────
  # 2. 内部人士买入检测
  # ────────────────────────────────────────────
  insider_buying:
    name: "内部人士买入检测"
    schedule: "weekly_monday_08:30"
    template: |
      今天是{DATE}。你是一位专注内幕交易信号的量化分析师。

      ## 你有以下工具可以使用
      - get_sec_data：查询 SEC EDGAR Form 4（内部人士交易记录）
      - get_market_data：获取股票当前价格和财务数据
      - web_search：搜索 OpenInsider 最新内部人士买入报告

      ## 任务步骤
      1. 用 web_search 搜索：
         - "insider buying significant purchases past 30 days site:openinsider.com"
         - "CEO CFO director stock purchase $100000 {DATE}"
         找出6个有重大内部人士买入的候选标的（金额>$10万，排除期权行权）
      2. 对每个候选标的：
         - 用 get_sec_data(query_type="insider_trading", ticker=候选股, days_back=30) 验证
         - 用 get_market_data(ticker=候选股, data_type="financials") 获取基本面
         - 用 get_market_data(ticker=候选股, data_type="price_history", period="3mo") 获取近期价格
      3. 筛选标准（严格执行）：
         - 买入方为 CEO/CFO/董事/10%以上大股东
         - 公开市场直接买入（非期权行权）
         - 优先多位内部人同期买入

      ## 输出要求
      严格输出以下JSON：
      {{
        "analysis_date": "{DATE}",
        "insider_signals": [
          {{
            "ticker": "",
            "company_name": "",
            "insider_title": "",
            "buy_amount_usd": 0,
            "shares_purchased": 0,
            "purchase_price": 0,
            "current_price": 0,
            "price_change_since_buy_pct": 0,
            "filing_date": "",
            "fundamental_health": "优/良/差",
            "why_significant": "",
            "risk_factors": "",
            "source_url": ""
          }}
        ],
        "summary": "3句话总结本周内部人士买入主要主题"
      }}
      返回6条记录，按买入金额降序。

  # ────────────────────────────────────────────
  # 3. 空头挤压筛选器
  # ────────────────────────────────────────────
  short_squeeze:
    name: "空头挤压筛选器"
    schedule: "weekly_tuesday_09:00"
    template: |
      今天是{DATE}。你是一位专注特殊情况投资的对冲基金分析师。

      ## 你有以下工具可以使用
      - get_market_data：获取空头数据（short_interest）和技术指标
      - web_search：搜索高空头比例股票列表和催化剂新闻

      ## 任务步骤
      1. 用 web_search 搜索：
         - "highest short interest stocks {DATE} short squeeze candidates"
         - "most shorted stocks days to cover high borrow rate"
         找出10个候选标的
      2. 对每个候选标的：
         - 用 get_market_data(ticker=候选股, data_type="short_interest") 获取精确空头数据
         - 用 get_market_data(ticker=候选股, data_type="technical_indicators") 获取技术面
         - 用 web_search 搜索该股票近期催化剂（财报日期/FDA审批/诉讼结果等）
      3. 筛选标准（必须同时满足）：
         - 空头占流通股 > 20%
         - Days to Cover > 3天
         - 有明确近期催化剂

      ## 风险评分说明（1-10，越高越危险）
      考虑：基本面是否支撑空头、流动性、大盘环境

      ## 输出要求
      严格输出以下JSON：
      {{
        "analysis_date": "{DATE}",
        "squeeze_candidates": [
          {{
            "ticker": "",
            "company_name": "",
            "short_float_pct": 0,
            "days_to_cover": 0,
            "borrow_rate_pct": 0,
            "catalyst": "",
            "catalyst_date": "",
            "current_price": 0,
            "52w_low": 0,
            "52w_high": 0,
            "entry_strategy": "",
            "squeeze_fail_risk_score": 0,
            "squeeze_fail_reason": "",
            "source_url": ""
          }}
        ],
        "market_context": "当前市场环境对空头挤压策略的影响"
      }}
      返回5条，按挤压潜力降序。

  # ────────────────────────────────────────────
  # 4. 并购雷达
  # ────────────────────────────────────────────
  ma_radar:
    name: "并购雷达"
    schedule: "weekly_tuesday_09:30"
    template: |
      今天是{DATE}。你是一位专注并购套利的对冲基金分析师。

      ## 你有以下工具可以使用
      - web_search：搜索并购传言、行业整合新闻、激进股东动态
      - get_market_data：获取估值数据（financials）
      - get_sec_data：查询激进股东申报（activist_filings）和重大事件（major_events）

      ## 任务步骤
      1. 用 web_search 搜索：
         - "M&A rumors acquisition target {DATE}"
         - "activist investor stake disclosure {DATE}"
         - "strategic review sale process company {DATE}"
         找出7个并购候选
      2. 对每个候选：
         - 用 get_market_data(data_type="financials") 获取估值和财务数据
         - 用 get_sec_data(query_type="activist_filings") 确认是否有激进股东
         - 用 get_sec_data(query_type="major_events") 查看近期8-K重大公告
         - 用 web_search 搜索同行业近2年并购溢价案例
      3. 筛选维度（满足2项以上）：
         - 行业整合趋势明显
         - 估值相对同行折价 > 20%
         - 有激进股东存在
         - 管理层变动/战略审查公告

      ## 输出要求
      严格输出以下JSON：
      {{
        "analysis_date": "{DATE}",
        "ma_candidates": [
          {{
            "ticker": "",
            "company_name": "",
            "sector": "",
            "current_price": 0,
            "ev_to_ebitda": 0,
            "sector_avg_ev_ebitda": 0,
            "valuation_discount_pct": 0,
            "estimated_takeover_premium_pct": 0,
            "implied_takeover_price": 0,
            "potential_acquirers": [""],
            "catalyst_evidence": "",
            "activist_present": false,
            "regulatory_risk": "低/中/高",
            "deal_probability_estimate": "低/中/高",
            "sources": ["", ""]
          }}
        ],
        "sector_ma_activity_summary": "当前并购最活跃的3个行业"
      }}
      返回5条记录。

  # ────────────────────────────────────────────
  # 5. 情绪 vs 基本面套利
  # ────────────────────────────────────────────
  sentiment_arbitrage:
    name: "情绪vs基本面套利"
    schedule: "weekly_wednesday_09:00"
    template: |
      今天是{DATE}。你是一位逆向投资专家。

      ## 你有以下工具可以使用
      - web_search：搜索负面情绪股票、超跌标的、分析师降级新闻
      - get_market_data：获取基本面数据和技术指标

      ## 任务步骤
      1. 用 web_search 搜索：
         - "oversold stocks negative sentiment strong fundamentals {DATE}"
         - "analyst downgrade overreaction fundamentals intact"
         - "stocks making new lows but earnings growth positive"
         找出8个候选
      2. 对每个候选：
         - 用 get_market_data(data_type="financials") 验证基本面
           必须满足至少2项：FCF为正且增长/净利润率高于同行/净债务EBITDA<2x/管理层回购
         - 用 get_market_data(data_type="technical_indicators") 获取技术面入场区间
         - 用 get_market_data(data_type="price_history", period="6mo") 确认超跌程度

      ## 输出要求
      严格输出以下JSON：
      {{
        "analysis_date": "{DATE}",
        "sentiment_arb_ideas": [
          {{
            "ticker": "",
            "company_name": "",
            "current_price": 0,
            "price_drop_6m_pct": 0,
            "negative_sentiment_reason": "",
            "fundamental_strengths": ["", ""],
            "key_metric_contradiction": "",
            "rsi_14": 0,
            "technical_entry_zone": {{"support": 0, "resistance": 0}},
            "expected_catalyst_for_rerating": "",
            "time_horizon": "1-3个月/3-6个月/6-12个月",
            "source_url": ""
          }}
        ],
        "contrarian_theme": "本周最突出的逆向投资主题"
      }}
      返回6条记录。

  # ────────────────────────────────────────────
  # 6. 危机中的关联性地图
  # ────────────────────────────────────────────
  correlation_map:
    name: "危机中的关联性地图"
    schedule: "weekly_wednesday_09:30"
    template: |
      今天是{DATE}。你是一位宏观量化策略师。

      ## 你有以下工具可以使用
      - get_market_data：获取各资产的历史价格数据
      - get_macro_data：获取宏观指标数据（VIX/收益率/美元指数）
      - web_search：搜索当前市场关联性异常分析报告

      ## 任务步骤
      1. 用 get_market_data 获取以下资产的6个月价格数据（period="6mo"）：
         - GLD（黄金）、SPY（美股）、TLT（长债）、UUP（美元）、QQQ（纳斯达克）
      2. 用 get_macro_data 获取：
         - VIXCLS（VIX恐慌指数）
         - T10Y2Y（收益率曲线）
         - DTWEXBGS（美元指数）
      3. 用 web_search 搜索：
         - "unusual asset correlation {DATE} gold stocks bonds"
         - "cross asset correlation breakdown {DATE}"
      4. 识别与历史均值偏差较大的资产对关联性（偏差>0.3视为异常）

      ## 输出要求
      严格输出以下JSON：
      {{
        "analysis_date": "{DATE}",
        "current_vix": 0,
        "yield_curve_spread": 0,
        "correlation_anomalies": [
          {{
            "asset_pair": "",
            "anomaly_description": "",
            "historical_signal_meaning": "",
            "normalization_trade": {{
              "description": "",
              "instruments": [""],
              "entry_trigger": ""
            }}
          }}
        ],
        "macro_regime": "当前市场所处宏观阶段判断",
        "regime_implication": "对资产配置的主要影响"
      }}

  # ────────────────────────────────────────────
  # 7. 分红危险雷达
  # ────────────────────────────────────────────
  dividend_danger:
    name: "分红危险雷达"
    schedule: "weekly_thursday_09:00"
    template: |
      今天是{DATE}。你是一位专注收益股分析的信用分析师。

      ## 你有以下工具可以使用
      - web_search：搜索高股息收益率股票列表
      - get_market_data：获取详细财务数据验证分红可持续性

      ## 任务步骤
      1. 用 web_search 搜索：
         - "high dividend yield stocks warning signs dividend cut risk {DATE}"
         - "dividend yield above 5% payout ratio too high"
         找出8个高股息候选（收益率>5%）
      2. 对每个候选：
         - 用 get_market_data(data_type="financials") 获取详细财务数据
         - 评估危险信号（满足2项以上则列入危险名单）：
           * 派息比率 > 80%
           * 自由现金流 < 股息总支出
           * 净债务/EBITDA > 4x
           * 近2年收入/利润下降趋势
         - 用 web_search 搜索同行业更安全的替代品

      ## 输出要求
      严格输出以下JSON：
      {{
        "analysis_date": "{DATE}",
        "dividend_traps": [
          {{
            "ticker": "",
            "company_name": "",
            "current_yield_pct": 0,
            "payout_ratio_pct": 0,
            "free_cashflow": 0,
            "annual_dividend_total": 0,
            "fcf_covers_dividend": true,
            "net_debt_ebitda": 0,
            "cut_probability": "低/中/高",
            "cut_probability_reason": "",
            "safer_alternative": {{
              "ticker": "",
              "yield_pct": 0,
              "why_safer": ""
            }},
            "source_url": ""
          }}
        ],
        "income_investing_caution": "当前利率环境对高息股的整体影响"
      }}
      返回5条记录。

  # ────────────────────────────────────────────
  # 8. 机构头寸分析
  # ────────────────────────────────────────────
  institutional_positioning:
    name: "机构头寸分析"
    schedule: "weekly_thursday_09:30"
    template: |
      今天是{DATE}。你是一位专注机构行为分析的量化研究员。

      ## 你有以下工具可以使用
      - web_search：搜索最新13F持仓变化报告
      - get_sec_data：查询具体股票的机构持仓（institutional_13f）
      - get_market_data：获取机构大量买入股票的技术面

      ## 追踪的重点基金
      Bridgewater / Pershing Square / Tiger Global / Renaissance /
      Two Sigma / Citadel / D.E. Shaw / Appaloosa / Third Point / Coatue

      ## 任务步骤
      1. 用 web_search 搜索：
         - "13F filing hedge fund new positions Q{QUARTER} {DATE}"
         - "Bridgewater Citadel Tiger Global new holdings {DATE}"
         - "hedge fund consensus buy Q{QUARTER} most popular stocks"
      2. 找出被3家以上基金同时新建仓的股票（共识买入信号）
      3. 对共识买入股票：
         - 用 get_sec_data(query_type="institutional_13f") 验证
         - 用 get_market_data(data_type="technical_indicators") 看技术面
      4. 找出被完全清仓的标的（多家同时退出）

      ## 输出要求
      严格输出以下JSON：
      {{
        "analysis_date": "{DATE}",
        "report_quarter": "",
        "consensus_buys": [
          {{
            "ticker": "",
            "company_name": "",
