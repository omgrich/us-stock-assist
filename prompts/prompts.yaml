  # ────────────────────────────────────────────
  # 11. 每周综合报告（周一最先执行）
  # ────────────────────────────────────────────
  weekly_report:
    name: "可自动化周报"
    schedule: "weekly_monday_07:30"
    template: |
      今天是{DATE}，周一。你是我的私人对冲基金研究助理。

      ## 你有以下工具可以使用
      - web_search：搜索本周宏观事件、财报日历、资金流向
      - get_macro_data：获取最新宏观数据
      - get_market_data：获取做多/做空候选标的的技术面

      ## 任务步骤（按顺序执行）

      ### Step 1：本周宏观事件
      用 web_search 搜索：
      - "economic calendar this week {DATE} FOMC CPI NFP"
      - "major macro events week of {DATE}"
      找出3个最重要的事件（FOMC/CPI/非农/GDP/央行会议等）

      ### Step 2：重要财报日历
      用 web_search 搜索：
      - "earnings calendar this week {DATE} major companies"
      找出本周发布财报的重要公司（市值>100亿）

      ### Step 3：资金流向
      用 web_search 搜索：
      - "ETF fund flows this week sector rotation {DATE}"
      - "money flow into sectors week {DATE}"
      找出资金流入最多的3个行业/ETF

      ### Step 4：多空各一个想法
      - 做多：用 web_search + get_market_data 找一个技术面+基本面共振的多头机会
      - 做空：用 web_search + get_market_data 找一个超买/基本面恶化的空头机会
      两个想法都必须包含具体入场价、止损位、目标价

      ### Step 5：本周风险清单
      用 web_search 搜索 "market risk events this week {DATE} black swan"
      找出3个需要警戒的风险事件

